# Render Blueprint — LiveQuizz Backend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: livequizz-server
    runtime: node
    region: singapore  # Low latency for South Asian classrooms
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
